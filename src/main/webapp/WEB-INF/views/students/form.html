<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thông tin Sinh viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>.error-text { color: red; font-weight: bold; }</style>
</head>
<body class="container mt-4">
<h2 th:text="${student.id == null ? 'Thêm mới Sinh viên' : 'Cập nhật Sinh viên'}"></h2>

<p class="error-text" th:if="${errorMessage}" th:text="${errorMessage}"></p>

<form th:action="@{/students/save}" th:object="${student}" method="post" class="w-50">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
        <label>Mã SV (SV + 4 chữ số):</label>
        <input type="text" th:field="*{studentCode}" class="form-control"
               required pattern="SV\d{4}" title="Định dạng SVxxxx (Ví dụ: SV1234)">
    </div>

    <div class="mb-3">
        <label>Họ tên (5-100 ký tự):</label>
        <input type="text" th:field="*{fullName}" class="form-control"
               required minlength="5" maxlength="100">
    </div>

    <div class="mb-3">
        <label>Email:</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Ngành học:</label>
        <select th:field="*{major}" class="form-select" required>
            <option value="">-- Chọn ngành --</option>
            <option value="CNTT">CNTT</option>
            <option value="Kinh tế">Kinh tế</option>
            <option value="Ngoại ngữ">Ngoại ngữ</option>
        </select>
    </div>

    <div class="mb-3">
        <label>GPA (0.0 - 10.0):</label>
        <input type="number" step="0.1" th:field="*{gpa}" class="form-control"
               required min="0" max="10">
    </div>

    <button type="submit" class="btn btn-primary">Lưu</button>
    <a th:href="@{/students}" class="btn btn-secondary">Hủy</a>
</form>
</body>
</html>

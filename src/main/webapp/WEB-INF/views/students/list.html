<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Sinh viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h2 class="mb-4">Quản lý Sinh viên</h2>

<div class="d-flex justify-content-between mb-3">
    <form th:action="@{/students}" method="get" class="d-flex w-50">
        <input type="text" name="keyword" th:value="${keyword}"
               class="form-control me-2" placeholder="Tìm theo tên hoặc mã...">
        <button class="btn btn-outline-primary" type="submit">Tìm</button>
    </form>
    <a th:href="@{/students/add}" class="btn btn-success">Thêm mới</a>
</div>

<div th:if="${#lists.isEmpty(students)}" class="alert alert-warning">
    Chưa có sinh viên nào trong hệ thống.
</div>

<table class="table table-bordered table-striped" th:if="${!#lists.isEmpty(students)}">
    <thead class="table-dark">
    <tr>
        <th>STT</th>
        <th><a class="text-white" th:href="@{/students(sort='studentCode', dir=${revDir}, keyword=${keyword}, page=${currentPage})}">Mã SV</a></th>
        <th><a class="text-white" th:href="@{/students(sort='fullName', dir=${revDir}, keyword=${keyword}, page=${currentPage})}">Họ tên</a></th>
        <th>Email</th>
        <th>Ngành</th>
        <th><a class="text-white" th:href="@{/students(sort='gpa', dir=${revDir}, keyword=${keyword}, page=${currentPage})}">GPA</a></th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="st, iter : ${students}">
        <td th:text="${(currentPage - 1) * 5 + iter.index + 1}"></td>
        <td th:text="${st.studentCode}"></td>
        <td th:text="${st.fullName}"></td>
        <td th:text="${st.email}"></td>
        <td th:text="${st.major}"></td>
        <td th:text="${st.gpa}"></td>
        <td>
            <a th:href="@{/students/edit/{id}(id=${st.id})}" class="btn btn-sm btn-warning">Sửa</a>
            <a th:href="@{/students/delete/{id}(id=${st.id})}" class="btn btn-sm btn-danger"
               onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

<nav th:if="${totalPages > 1}">
    <ul class="pagination">
        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
            <a class="page-link" th:href="@{/students(page=${currentPage - 1}, keyword=${keyword}, sort=${sort}, dir=${dir})}">Previous</a>
        </li>

        <li class="page-item active">
                <span class="page-link">
                    Trang <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span>
                </span>
        </li>

        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
            <a class="page-link" th:href="@{/students(page=${currentPage + 1}, keyword=${keyword}, sort=${sort}, dir=${dir})}">Next</a>
        </li>
    </ul>
</nav>
</body>
</html>
